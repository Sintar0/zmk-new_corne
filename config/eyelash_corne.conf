# Configuration ZMK — Eyelash Corne
# Ergol sur Linux (disposition gérée côté système)

# ─── Bluetooth ────────────────────────────────────────────────────────────────
# Activer le Bluetooth
CONFIG_BT=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ─── USB / Bluetooth output ───────────────────────────────────────────────────
# Préférer USB quand branché (comportement par défaut)
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# ─── OLED Display ─────────────────────────────────────────────────────────────
# Activer si ton Eyelash Corne a des écrans OLED
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ─── RGB / LED ────────────────────────────────────────────────────────────────
# Désactiver le RGB au démarrage pour économiser la batterie
# Décommenter si tu as des LEDs RGB sur ton clavier
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_MIN=10
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=80

# ─── Gestion de l'énergie ─────────────────────────────────────────────────────
# Mise en veille automatique après inactivité (en ms — ici 30 minutes)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ─── Comportement des touches ─────────────────────────────────────────────────
# Délai pour distinguer tap / hold (en ms)
# 200ms est un bon compromis pour débuter
CONFIG_ZMK_HOLD_TAP_DEFAULT_FLAVOR="balanced"

# ─── Combinaisons de touches (combos) ────────────────────────────────────────
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4

# ─── Logs de debug (désactiver en production) ─────────────────────────────────
# CONFIG_ZMK_LOG_LEVEL_DBG=y
